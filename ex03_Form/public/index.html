<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <img style = "weidth : 600px header" src = "./한동환123.jpg">
    <h1>index</h1>

    <!-- form 태그 : 데이터를 서버에 전달하기 위한 태그
     전송 방식 1) get (기본 전달 방식으로 생략이 가능하다) (method만 생략가능)
      - 사용자가 보내는 데이터가 URL에 노출이 된다.
      - 보안↓, 데이터를 보내는 길이에 제한이 있따
      - 데이터를 보내기 위해 쿼리스트링 문법 사용
        ex) http://www.naver.com? 키 = 값

     전송 방식 2) post
     -->

     
     <h3>get 방식</h3>
     <form action="/getKeyword" method="get">
        <input type="text" placeholder="검색어를 입력하세요" name="keyword">
        <input type="submit" value="검색">


     </form>


</body>
</html>
